<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexGuard AI | Past Case Matcher</title>

  <link rel="stylesheet" href="/static/cases.css" />
  <link rel="stylesheet" href="/static/style.css" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>

<body>

  <script> window.chtlConfig = { chatbotId: "7631258385" } </script>
  <script async data-id="7631258385" id="chtl-script" type="text/javascript"
    src="https://chatling.ai/js/embed.js"></script>
  <div class="container">
    <header class="header">
      <button class="back-btn" onclick="window.location.href='/'">⬅ Back to Dashboard</button>
      <h1>LexGuard AI</h1>
      <p class="subtitle">
        Your Intelligent Legal Protection System — Past Case Matcher
      </p>
    </header>

    <section class="pastcases-search-section">
      <div class="search-group">
        <input type="text" id="caseKeyword"
          placeholder="Search by case name, keywords, or legal topic (e.g., Privacy, Article 21)..." />
      </div>

      <div class="filter-row" style="display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap">
        <select id="yearFilter" style="flex: 1; min-width: 150px">
          <option value="Any">All Years</option>
          <option value="2020">2020</option>
          <option value="2019">2019</option>
          <option value="2018">2018</option>
          <option value="2017">2017</option>
          <option value="2015">2015</option>
          <option value="2014">2014</option>
          <option value="2013">2013</option>
          <option value="2012">2012</option>
          <option value="2011">2011</option>
          <option value="2006">2006</option>
          <option value="2005">2005</option>
          <option value="2004">2004</option>
          <option value="2000">2000</option>
          <option value="1999">1999</option>
          <option value="1997">1997</option>
          <option value="1996">1996</option>
          <option value="1995">1995</option>
          <option value="1994">1994</option>
          <option value="1993">1993</option>
          <option value="1992">1992</option>
          <option value="1991">1991</option>
          <option value="1986">1986</option>
          <option value="1985">1985</option>
          <option value="1982">1982</option>
          <option value="1981">1981</option>
          <option value="1980">1980</option>
          <option value="1979">1979</option>
          <option value="1978">1978</option>
          <option value="1976">1976</option>
          <option value="1973">1973</option>
          <option value="1967">1967</option>
          <option value="1951">1951</option>
        </select>

        <select id="courtFilter" style="flex: 1; min-width: 150px">
          <option value="Any">All Courts</option>
          <option value="Supreme Court">Supreme Court</option>
          <option value="High Court">High Court</option>
        </select>

        <button class="primary-btn" onclick="handleSearch()" style="flex: 0.5; min-width: 150px">
          Search Precedents
        </button>
      </div>
    </section>

    <div id="loadingIndicator" class="loading-indicator" style="display: none">
      <div class="spinner"></div>
      <p>Scanning 50+ Landmark Judgments...</p>
    </div>

    <div class="cases-grid" id="casesGrid"></div>

    <footer class="footer">
      <p>⚠ For educational & informational purposes only.</p>
    </footer>
  </div>

  <div class="modal-overlay" id="caseModal" style="display: none">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal()">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="/static/cases.js"></script>
</body>

</html>
