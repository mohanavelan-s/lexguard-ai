<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | LexGuard AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #f5f5f5;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-container {
            background-color: rgba(25, 25, 35, 0.95);
            padding: 40px 35px;
            border-radius: 14px;
            width: 440px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .settings-container h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.6rem;
        }

        .settings-container .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #2a2a3a;
            color: #fff;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00c6ff;
        }

        .form-group input::placeholder {
            color: #777;
        }

        .form-group .hint {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
        }

        .section-divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin: 24px 0;
        }

        .section-label {
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
        }

        .submit-btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #0072ff, #00c6ff);
            color: #fff;
            font-weight: 600;
            font-size: 1.05rem;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 6px;
        }

        .submit-btn:hover {
            opacity: 0.85;
        }

        .error-msg {
            background: rgba(220, 38, 38, 0.15);
            border: 1px solid #f87171;
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            text-align: center;
        }

        .success-msg {
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid #22c55e;
            color: #86efac;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            text-align: center;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .back-link:hover {
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <div class="settings-container">
        <h1>⚙️ Settings</h1>
        <p class="subtitle">Manage your profile</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="success-msg">{{ success }}</div>
        {% endif %}

        <form method="POST" action="/settings" id="settingsForm">
            <!-- Profile Section -->
            <div class="form-group">
                <label for="name">Username</label>
                <input type="text" id="name" name="name" value="{{ user.name }}" placeholder="Your display name"
                    required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ user.email }}" placeholder="you@example.com"
                    required>
            </div>

            <hr class="section-divider">
            <p class="section-label">🔒 Change Password (Optional)</p>

            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" placeholder="Leave blank to keep current">
                <p class="hint">Leave empty if you don't want to change your password</p>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password"
                    placeholder="Re-enter new password">
            </div>

            <button type="submit" class="submit-btn">💾 Save Changes</button>
        </form>

        <a href="/" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        // Client-side validation
        document.getElementById('settingsForm').addEventListener('submit', function (e) {
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const email = document.getElementById('email').value;

            // Basic email format check
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                e.preventDefault();
                alert('⚠️ Please enter a valid email address.');
                return;
            }

            // Password confirmation match
            if (newPassword && newPassword !== confirmPassword) {
                e.preventDefault();
                alert('⚠️ Passwords do not match.');
                return;
            }

            // Minimum password length
            if (newPassword && newPassword.length < 4) {
                e.preventDefault();
                alert('⚠️ Password must be at least 4 characters long.');
                return;
            }
        });
    </script>
</body>

</html>
